[build]
  command = "npm run build"
  publish = "out"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# ════════════════════════════════════════════════════════════════
# SECURITY HEADERS — applied to all routes
# ════════════════════════════════════════════════════════════════
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), interest-cohort=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Cross-Origin-Opener-Policy = "same-origin-allow-popups"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://identity.netlify.com https://cdn.onesignal.com https://*.onesignal.com https://unpkg.com; script-src-elem 'self' 'unsafe-inline' https://identity.netlify.com https://cdn.onesignal.com https://*.onesignal.com https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://unpkg.com https://onesignal.com https://*.onesignal.com; style-src-elem 'self' 'unsafe-inline' https://fonts.googleapis.com https://unpkg.com https://onesignal.com https://*.onesignal.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob: https: https://*.onesignal.com; connect-src 'self' https://identity.netlify.com https://*.netlify.app https://*.onesignal.com https://api.github.com wss://*.onesignal.com; frame-src 'self' https://onesignal.com https://*.onesignal.com https://www.youtube-nocookie.com; worker-src 'self' blob:; manifest-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'"

# ════════════════════════════════════════════════════════════════
# CONTENT-TYPE overrides for dynamic image routes
# ════════════════════════════════════════════════════════════════
[[headers]]
  for = "/opengraph-image"
  [headers.values]
    Content-Type = "image/png"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/icon"
  [headers.values]
    Content-Type = "image/png"
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/apple-icon"
  [headers.values]
    Content-Type = "image/png"
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Service-Worker-Allowed = "/"

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json"
    Cache-Control = "public, max-age=3600"
